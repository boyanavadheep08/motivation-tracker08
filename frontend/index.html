<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Motitrack — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
:root {
  --bg: #080810; --surface: #0e0e1c; --card: #13131f;
  --border: rgba(255,255,255,0.06); --accent: #7c6dfa;
  --accent2: #fa6d9a; --accent3: #6dfac8;
  --text: #f0eeff; --muted: #6b6a8a;
  --glow: rgba(124,109,250,0.35);
}
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg); color: var(--text);
  min-height: 100vh;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
.bg-orbs { position: fixed; inset: 0; pointer-events: none; }
.orb {
  position: absolute; border-radius: 50%; filter: blur(80px);
  animation: float 8s ease-in-out infinite;
}
.orb-1 { width:500px;height:500px;background:rgba(124,109,250,0.12);top:-10%;left:-10%; }
.orb-2 { width:400px;height:400px;background:rgba(250,109,154,0.08);bottom:-10%;right:-10%;animation-delay:-3s; }
.orb-3 { width:300px;height:300px;background:rgba(109,250,200,0.07);top:40%;left:50%;animation-delay:-5s; }
@keyframes float {
  0%,100%{transform:translate(0,0)scale(1);}
  33%{transform:translate(30px,-30px)scale(1.05);}
  66%{transform:translate(-20px,20px)scale(0.95);}
}
.grid-bg {
  position: fixed; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size: 60px 60px;
}
.wrapper {
  position: relative; z-index: 10;
  width: 100%; max-width: 460px; padding: 24px;
  animation: slideUp 0.7s cubic-bezier(0.16,1,0.3,1) forwards;
  opacity: 0; transform: translateY(30px);
}
@keyframes slideUp { to { opacity:1; transform:translateY(0); } }
.logo { text-align: center; margin-bottom: 40px; }
.logo-icon {
  width:64px;height:64px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:20px;
  display:inline-flex;align-items:center;justify-content:center;
  font-size:28px;margin-bottom:16px;
  box-shadow:0 0 40px var(--glow);
  animation: pulse 3s ease-in-out infinite;
}
@keyframes pulse {
  0%,100%{box-shadow:0 0 40px var(--glow);}
  50%{box-shadow:0 0 60px rgba(124,109,250,0.5);}
}
.logo h1 { font-family:'Syne',sans-serif;font-size:28px;font-weight:800; }
.logo h1 span { color: var(--accent); }
.logo p { color: var(--muted); font-size: 14px; margin-top: 4px; }
.card {
  background: var(--card); border: 1px solid var(--border);
  border-radius: 24px; padding: 36px; position: relative; overflow: hidden;
}
.card::before {
  content:''; position:absolute; top:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--accent),transparent);
  opacity:0.5;
}
.tabs {
  display:flex; background:var(--surface); border-radius:12px;
  padding:4px; margin-bottom:28px; gap:4px;
}
.tab {
  flex:1;padding:10px;border:none;background:transparent;
  color:var(--muted);font-family:'Syne',sans-serif;
  font-weight:600;font-size:14px;border-radius:9px;cursor:pointer;
  transition:all 0.3s;
}
.tab.active { background:var(--accent);color:white;box-shadow:0 4px 15px var(--glow); }
.form-group { margin-bottom: 18px; }
label {
  display:block;font-size:12px;font-weight:500;color:var(--muted);
  margin-bottom:8px;text-transform:uppercase;letter-spacing:0.8px;
}
.input-wrap { position: relative; }
.input-icon {
  position:absolute;left:14px;top:50%;transform:translateY(-50%);
  font-size:16px;opacity:0.5;
}
input[type="text"],input[type="email"],input[type="password"] {
  width:100%;padding:14px 14px 14px 42px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;color:var(--text);
  font-family:'DM Sans',sans-serif;font-size:15px;outline:none;
  transition:all 0.3s;
}
input:focus {
  border-color:var(--accent);
  box-shadow:0 0 0 3px rgba(124,109,250,0.15);
}
input::placeholder { color: var(--muted); }
.btn {
  width:100%;padding:15px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;border-radius:12px;color:white;
  font-family:'Syne',sans-serif;font-size:16px;font-weight:700;
  cursor:pointer;transition:all 0.3s;margin-top:8px;
}
.btn:hover { transform:translateY(-2px);box-shadow:0 8px 25px var(--glow); }
.btn:disabled { opacity:0.6;cursor:not-allowed;transform:none; }
.alert {
  padding:12px 16px;border-radius:10px;font-size:13px;
  margin-bottom:16px;display:none;align-items:center;gap:8px;
}
.alert.error { background:rgba(250,100,100,0.1);border:1px solid rgba(250,100,100,0.3);color:#ff8080; }
.alert.success { background:rgba(109,250,200,0.1);border:1px solid rgba(109,250,200,0.3);color:var(--accent3); }
.alert.show { display:flex;animation:fadeIn 0.3s ease; }
@keyframes fadeIn { from{opacity:0;transform:translateY(-5px);}to{opacity:1;transform:translateY(0);} }
.form-panel { display:none; }
.form-panel.active { display:block;animation:fadeIn 0.3s ease; }
.spinner {
  display:inline-block;width:18px;height:18px;
  border:2px solid rgba(255,255,255,0.3);
  border-top-color:white;border-radius:50%;
  animation:spin 0.8s linear infinite;
}
@keyframes spin { to { transform:rotate(360deg); } }
.features { display:flex;gap:12px;margin-top:28px; }
.feature {
  flex:1;background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:12px;text-align:center;
  font-size:11px;color:var(--muted);
}
.feature-icon { font-size:20px;margin-bottom:4px; }
</style>
</head>
<body>
<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-bg"></div>
<div class="wrapper">
  <div class="logo">
    <div class="logo-icon">🔥</div>
    <h1>Moti<span>track</span></h1>
    <p>Your personal growth command center</p>
  </div>
  <div class="card">
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab" onclick="switchTab('register')">Create Account</button>
    </div>
    <div id="alert" class="alert"></div>
    <div class="form-panel active" id="loginPanel">
      <div class="form-group">
        <label>Username or Email</label>
        <div class="input-wrap">
          <span class="input-icon">👤</span>
          <input type="text" id="loginUsername" placeholder="Enter your username">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input type="password" id="loginPassword" placeholder="Enter your password">
        </div>
      </div>
      <button class="btn" id="loginBtn" onclick="handleLogin()">
        <span id="loginBtnText">Sign In →</span>
      </button>
    </div>
    <div class="form-panel" id="registerPanel">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <span class="input-icon">✨</span>
          <input type="text" id="regUsername" placeholder="Choose a username">
        </div>
      </div>
      <div class="form-group">
        <label>Email</label>
        <div class="input-wrap">
          <span class="input-icon">📧</span>
          <input type="email" id="regEmail" placeholder="your@email.com">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="regPassword" placeholder="Min. 6 characters">
        </div>
      </div>
      <button class="btn" id="registerBtn" onclick="handleRegister()">
        <span id="registerBtnText">Create Account →</span>
      </button>
    </div>
  </div>
  <div class="features">
    <div class="feature"><div class="feature-icon">🔥</div>Streaks</div>
    <div class="feature"><div class="feature-icon">📊</div>Charts</div>
    <div class="feature"><div class="feature-icon">📖</div>Diary</div>
    <div class="feature"><div class="feature-icon">🎯</div>Goals</div>
  </div>
</div>
<script>
const API = '/api';
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active',(i===0)===(tab==='login')));
  document.getElementById('loginPanel').classList.toggle('active', tab==='login');
  document.getElementById('registerPanel').classList.toggle('active', tab==='register');
  document.getElementById('alert').className = 'alert';
}
function showAlert(msg, type='error') {
  const el = document.getElementById('alert');
  el.className = `alert ${type} show`;
  el.innerHTML = `<span>${type==='error'?'⚠️':'✅'}</span> ${msg}`;
}
function setLoading(btnId, textId, loading, defaultText) {
  document.getElementById(btnId).disabled = loading;
  document.getElementById(textId).innerHTML = loading ? '<span class="spinner"></span>' : defaultText;
}
async function handleLogin() {
  const username = document.getElementById('loginUsername').value.trim();
  const password = document.getElementById('loginPassword').value;
  if (!username || !password) return showAlert('Please fill in all fields.');
  setLoading('loginBtn','loginBtnText',true,'Sign In →');
  try {
    const res = await fetch(`${API}/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,password})});
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    showAlert('Welcome back! Redirecting...','success');
    setTimeout(()=>window.location.href='/pages/dashboard.html', 800);
  } catch(err) {
    showAlert(err.message||'Login failed.');
  } finally {
    setLoading('loginBtn','loginBtnText',false,'Sign In →');
  }
}
async function handleRegister() {
  const username = document.getElementById('regUsername').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const password = document.getElementById('regPassword').value;
  if (!username||!email||!password) return showAlert('Please fill in all fields.');
  setLoading('registerBtn','registerBtnText',true,'Create Account →');
  try {
    const res = await fetch(`${API}/auth/register`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username,email,password})});
    const data = await res.json();
    if (!res.ok) throw new Error(data.error);
    localStorage.setItem('token', data.token);
    localStorage.setItem('user', JSON.stringify(data.user));
    showAlert('Account created! Setting up...','success');
    setTimeout(()=>window.location.href='/pages/dashboard.html', 800);
  } catch(err) {
    showAlert(err.message||'Registration failed.');
  } finally {
    setLoading('registerBtn','registerBtnText',false,'Create Account →');
  }
}
document.addEventListener('keydown', e => {
  if (e.key==='Enter') document.getElementById('loginPanel').classList.contains('active') ? handleLogin() : handleRegister();
});
if (localStorage.getItem('token')) window.location.href = '/pages/dashboard.html';
</script>
</body>
</html>
